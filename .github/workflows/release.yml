name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir -p build/mob-slack-reports
          rsync -a --exclude='.git' --exclude='.github' --exclude='composer.phar' --exclude='*.log' ./ build/mob-slack-reports/
          cd build && zip -rq mob-slack-reports.zip mob-slack-reports/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/mob-slack-reports.zip
          generate_release_notes: true
